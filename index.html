<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conqueror's Crown - TCG</title>
    <style>
        :root {
            --bg-color: #0d0d12; --board-color: #1a1a24; --gold: #d4af37;
            --mana-color: #3498db; --hp-color: #2ecc71; --card-unit: #232931;
            --slash-url: none;
            --arrow-url: none;
            --shuriken-url: none;
        }

        body {
            margin: 0; font-family: 'Cinzel', 'Georgia', serif;
            background-color: var(--bg-color); color: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- Start Screen --- */
        #start-screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(13, 13, 18, 0.6), rgba(13, 13, 18, 0.95)), url('./assets/MainMenuBG.jpg');
            background-size: cover; background-position: center; z-index: 500; 
        }
        #start-screen h1 { font-size: 4rem; color: var(--gold); letter-spacing: 8px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); text-align: center; }
        .subtitle { color: #888; margin-bottom: 40px; letter-spacing: 2px; text-align: center; }
        .upload-area { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 20px; text-align: center; position: relative; cursor: pointer; transition: 0.3s;}
        .upload-area:hover { background: rgba(212, 175, 55, 0.2); transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        #absorbing-text { display: none; color: var(--gold); font-size: 1.5rem; margin-top: 20px; animation: pulse 1s infinite alternate; text-shadow: 0 0 10px #000;}
        @keyframes pulse { from { opacity: 0.6; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

        /* --- Game Header --- */
        #game-header { width: 100%; height: 50px; padding: 0 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; color: var(--gold); font-weight: bold; flex-shrink: 0; z-index: 50;}
        #mana-display { color: var(--mana-color); font-size: 1.2rem; }
        
        /* --- Master Layout Grid --- */
        #game-area { 
            display: none; flex-direction: row; justify-content: space-between; align-items: stretch;
            width: 100vw; height: calc(100vh - 50px); padding: 10px 15px; box-sizing: border-box; 
            background: #16161d; overflow: hidden; gap: 15px;
        }

        .side-panel { width: 320px; display: flex; flex-direction: column; gap: 10px; height: 100%; flex-shrink: 0; }
        .center-panel { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; overflow: hidden; position: relative;}

        /* --- LEFT PANEL --- */
        #card-inspector { flex-grow: 1; background: rgba(17, 17, 17, 0.95); border: 1px solid var(--gold); border-radius: 8px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        #inspect-content { height: 100%; padding-right: 5px; }
        #inspect-content::-webkit-scrollbar { width: 5px; } #inspect-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px;}
        
        #hand-container { height: 160px; background: rgba(0,0,0,0.85); padding: 10px; border: 2px solid #333; border-radius: 12px; display: flex; align-items: center; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); flex-shrink: 0; }
        #hand { display: flex; gap: 8px; flex-grow: 1; overflow-x: hidden; scroll-behavior: smooth; padding: 5px; }
        .scroll-btn { background: #222; color: var(--gold); border: 1px solid #444; border-radius: 5px; font-size: 1.2rem; cursor: pointer; padding: 5px; height: 100%; display: flex; align-items: center; transition: 0.2s; }
        .scroll-btn:hover { background: #444; border-color: var(--gold); }

        /* --- RIGHT PANEL --- */
        .btn-main { width: 100%; padding: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 4px; flex-shrink: 0; font-family: 'Cinzel'; transition: 0.2s;}
        .btn-main:hover { transform: scale(1.02); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); transform: none; }
        #cancel-btn { background: #e74c3c; color: white; display: none; }
        #exec-btn { background: #2ecc71; color: #111; }
        #end-turn-btn { background: var(--gold); color: #111; }
        
        #event-log { flex-grow: 1; background: rgba(10, 10, 15, 0.95); border: 1px solid #333; border-radius: 6px; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; box-sizing: border-box; }
        #event-log::-webkit-scrollbar { width: 5px; } #event-log::-webkit-scrollbar-thumb { background: #444; border-radius: 5px;}

        /* --- CENTER PANEL --- */
        #turn-banner { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); padding: 4px 30px; font-size: 0.9rem; border-radius: 20px; margin-bottom: 5px; flex-shrink: 0;}
        
        .core-container { text-align: center; margin: 5px 0; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; position: relative;}
        .core-crystal { width: 30px; height: 40px; background: linear-gradient(135deg, #e74c3c, #8e44ad); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);}
        .player-core .core-crystal { background: linear-gradient(135deg, #3498db, #2ecc71); box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);}
        .core-hp { font-weight: bold; font-size: 0.8rem; color: white; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 6px; border: 1px solid #444; letter-spacing: 1px;}

        .battlefield { display: flex; flex-direction: column; gap: 6px; align-items: center; flex-shrink: 1;}
        .board { display: flex; flex-direction: column; gap: 8px; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .row { display: flex; gap: 12px; justify-content: center;}
        
        /* Slot & Card Alignment OVERHAUL */
        .slot { width: 100px; height: 140px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #555; position: relative; box-sizing: border-box; padding: 0;}
        .slot.drag-over { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .ability-slot { border-color: #9b59b6; color: #9b59b6; }
        .slot-text { pointer-events: none; z-index: 1; }

        .card { width: 100px; height: 140px; border-radius: 6px; padding: 5px; box-sizing: border-box; cursor: grab; background: var(--card-unit); border: 1px solid #444; display: flex; flex-direction: column; justify-content: space-between; font-family: sans-serif; position: relative; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s;}
        
        .slot .card { position: absolute; top: -1px; left: -1px; width: calc(100% + 2px); height: calc(100% + 2px); margin: 0; z-index: 10; border-radius: 6px; border: 1px solid #444; box-sizing: border-box; }
        
        .card:hover { transform: translateY(-5px); border-color: var(--gold); z-index: 20;}
        .card.exhausted { filter: grayscale(1) brightness(0.5); cursor: not-allowed; }
        .card.queued-status { outline: 2px solid #f39c12; filter: brightness(0.8); }
        .card.taunted-status { outline: 2px solid #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        
        /* Dynamic Targeting Glows */
        .card.target-glow { outline: 3px solid #ff4d4d; box-shadow: 0 0 20px #ff4d4d; cursor: crosshair; animation: pulse-target 1s infinite alternate;}
        @keyframes pulse-target { from { box-shadow: 0 0 10px #ff4d4d; } to { box-shadow: 0 0 25px #ff4d4d; } }
        .target-line-glow { outline: 3px dashed #ff9f43; box-shadow: 0 0 20px #ff9f43; }
        
        .target-heal-glow { outline: 3px solid #2ecc71; box-shadow: 0 0 20px #2ecc71; cursor: crosshair; animation: pulse-heal 1s infinite alternate; }
        @keyframes pulse-heal { from { box-shadow: 0 0 10px #2ecc71; } to { box-shadow: 0 0 25px #2ecc71; } }

        .target-buff-glow { outline: 3px solid #9b59b6; box-shadow: 0 0 20px #9b59b6; cursor: crosshair; animation: pulse-buff 1s infinite alternate; }
        @keyframes pulse-buff { from { box-shadow: 0 0 10px #9b59b6; } to { box-shadow: 0 0 25px #9b59b6; } }

        .buff-double-action { outline: 3px solid #9b59b6; box-shadow: 0 0 15px #9b59b6; animation: purple-burn 0.8s infinite alternate; }
        @keyframes purple-burn { from { box-shadow: 0 0 10px #9b59b6; } to { box-shadow: 0 0 25px #9b59b6; } }

        .card-title { font-size: 0.65rem; font-weight: bold; text-align: center; color: var(--gold); line-height: 1; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-level { text-align: center; font-size: 0.55rem; color: #aaa; margin-bottom: 2px;}
        .card-img-container { flex-grow: 1; margin: 3px 0; background-color: #111; border-radius: 3px; border: 1px solid #333; background-size: cover; background-position: center; pointer-events: none;}

        .badge-mana { position: absolute; top: -5px; left: -5px; background: var(--mana-color); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; font-size: 0.65rem; font-weight: bold; border: 1px solid #111; z-index: 15;}
        .badge-hp { position: absolute; bottom: -5px; right: -5px; background: var(--hp-color); color: #111; border-radius: 4px; padding: 1px 5px; font-size: 0.65rem; font-weight: bold; border: 1px solid #111; z-index: 15;}
        
        .placed-badge { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(231, 76, 60, 0.9); color: white; padding: 2px 6px; font-size: 0.65rem; font-weight: bold; border-radius: 3px; z-index: 25; pointer-events: none; text-shadow: 1px 1px 0 #000; border: 1px solid #fff;}
        .badge-blessing { position: absolute; top: -8px; left: 20px; background: #f1c40f; color: #111; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; font-weight: bold; border: 1px solid #111; z-index: 26; box-shadow: 0 0 10px #f1c40f;}
        .badge-shield { position: absolute; bottom: 22px; right: -5px; background: #3498db; color: white; border-radius: 4px; padding: 1px 5px; font-size: 0.65rem; font-weight: bold; border: 1px solid #111; z-index: 15; box-shadow: 0 0 10px #3498db;}

        /* --- DECKS --- */
        .deck-container { position: absolute; right: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 50; }
        #enemy-deck-area { top: 20px; }
        #player-deck-area { bottom: 20px; }
        .deck-stack { width: 85px; height: 125px; border-radius: 6px; border: 1px solid #555; background-color: #1a1a24; background-size: cover; background-position: center; box-shadow: -2px 2px 0 #222, -4px 4px 0 #111, -6px 6px 0 #333, -8px 8px 10px rgba(0,0,0,0.8); transition: opacity 0.3s; }
        #enemy-deck-area .deck-stack { transform: rotate(180deg); box-shadow: 2px -2px 0 #222, 4px -4px 0 #111, 6px -6px 0 #333, 8px -8px 10px rgba(0,0,0,0.8); }
        .deck-count { width: 100%; text-align: center; font-weight: bold; color: var(--gold); font-size: 0.8rem; text-shadow: 0 2px 4px rgba(0,0,0,1); }
        
        #draw-cards-btn { display: none; padding: 10px 15px; background: var(--gold); color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; font-size: 0.8rem;}
        #draw-cards-btn:disabled { animation: none; filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        /* --- VISUAL EFFECTS --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-4px, 0px) rotate(1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            80% { transform: translate(-1px, -2px) rotate(1deg); }
            100% { transform: translate(2px, -2px) rotate(-1deg); }
        }
        .shake-anim { animation: shake 0.4s; }

        @keyframes shimmer {
            0% { filter: brightness(1) drop-shadow(0 0 0px var(--gold)); }
            50% { filter: brightness(1.8) drop-shadow(0 0 25px var(--gold)); }
            100% { filter: brightness(1) drop-shadow(0 0 0px var(--gold)); }
        }
        .shimmer-fx { animation: shimmer 1s ease-in-out; }

        .floating-text { position: absolute; font-weight: bold; font-family: 'Cinzel', serif; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; pointer-events: none; z-index: 1000; animation: floatUp 1.2s forwards ease-out; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-70px) scale(1.4); opacity: 0; } }

        .slash-fx { position: absolute; top: 50%; left: 50%; width: 250%; height: 250%; transform: translate(-50%, -50%); background-image: var(--slash-url); background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; z-index: 9999; opacity: 0; animation: slashFade 0.6s ease-out forwards; }
        @keyframes slashFade { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); } }
        
        .arrow-fx { position: fixed; width: 40px; height: 10px; background-image: var(--arrow-url); background-size: contain; background-repeat: no-repeat; z-index: 9999; pointer-events: none; transition: all 0.3s linear; }

        /* SAN OVERHAUL */
        .san-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; color: #e74c3c; font-weight: bold; font-family: 'Cinzel', serif; text-shadow: 0 0 20px #000, 0 0 40px #e74c3c; z-index: 10000; pointer-events: none; animation: sanPulse 1s ease-out forwards; }
        @keyframes sanPulse { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 85% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }

        .shuriken-fx { position: fixed; top: 0; left: 0; margin-top: -25px; margin-left: -25px; width: 50px; height: 50px; z-index: 9999; pointer-events: none; background-image: var(--shuriken-url); background-size: contain; background-repeat: no-repeat; }
        @keyframes spinFly { 0% { transform: translate(var(--startX), var(--startY)) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--endX), var(--endY)) rotate(1440deg); opacity: 0; } }

        .flying-card { position: fixed; width: 100px; height: 140px; border-radius: 6px; border: 1px solid #555; background-color: #1a1a24; background-size: cover; background-position: center; z-index: 1000; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .flip-reveal { animation: flipIn 0.6s ease-out forwards; }
        @keyframes flipIn { 0% { transform: perspective(400px) rotateY(90deg); opacity: 0; } 100% { transform: perspective(400px) rotateY(0deg); opacity: 1; } }

        /* --- Inspector Info --- */
        .inspect-h { color: var(--gold); margin: 0 0 5px 0; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .inspect-sub { font-size: 0.65rem; color: #888; margin-bottom: 10px; text-transform: uppercase;}
        .inspect-art { width: 100%; aspect-ratio: 2.5 / 3.5; max-height: 380px; object-fit: contain; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; background: transparent; display: block;}
        .inspect-stat { font-size: 0.75rem; margin: 2px 0; }
        .inspect-section { margin-top: 10px; border-top: 1px solid #333; padding-top: 8px; }
        .skill-btn { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 6px; margin-top: 5px; cursor: pointer; text-align: left; transition: 0.2s; border-radius: 4px;}
        .skill-btn:hover { border-color: var(--gold); background: #333; }
        .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #444 !important; }
        .skill-name { color: var(--gold); font-weight: bold; font-size: 0.75rem;}
        .skill-cost { color: var(--mana-color); font-size: 0.65rem; float: right;}
        .skill-desc { font-size: 0.65rem; color: #ccc; margin-top: 3px; display: block;}
        .empty-inspector { text-align: center; color: #666; margin-top: 50%; font-style: italic; font-size: 0.9rem;}
    </style></head><body>

    <div id="start-screen">
        <h1>CONQUEROR'S CROWN</h1>
        <div class="subtitle">Tactical Deployment</div>
        <div class="upload-area" id="upload-box" onclick="initializeGame()">
            <h2>START GAME</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Enter the battlefield.</p>
        </div>
        <div id="absorbing-text">Loading Assets...</div>
    </div>

    <div id="game-header">
        <span>CONQUEROR'S CROWN</span>
        <span id="mana-display">MANA: 8</span>
    </div>

    <div id="game-area">
        <!-- LEFT PANEL -->
        <div class="side-panel">
            <div id="card-inspector"><div id="inspect-content"><div class="empty-inspector">Select a card to inspect.</div></div></div>
            <div id="hand-container">
                <button class="scroll-btn" id="scroll-left">&#9664;</button>
                <div id="hand"></div>
                <button class="scroll-btn" id="scroll-right">&#9654;</button>
            </div>
        </div>

        <!-- CENTER PANEL -->
        <div class="center-panel">
            <div id="turn-banner">PLAYER TURN 1</div>
            <div class="battlefield">
                <div class="core-container enemy-core" id="e-core-target"><div class="core-crystal"></div><div class="core-hp" id="enemy-core-hp">ENEMY CORE: 2000 | MANA: 8</div></div>
                <div class="board">
                    <div class="row">
                        <div class="slot backline" data-side="ENEMY" data-allowed="unit"><span class="slot-text">UNIT</span></div>
                        <div class="slot backline ability-slot" data-side="ENEMY" data-allowed="ability"><span class="slot-text">ABILITY</span></div>
                        <div class="slot backline" data-side="ENEMY" data-allowed="unit"><span class="slot-text">UNIT</span></div>
                    </div>
                    <div class="row">
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                    </div>
                </div>
                <div class="board" style="border-top: 1px solid #333; padding-top: 15px;">
                    <div class="row">
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit"><span class="slot-text">FRONT</span></div>
                    </div>
                    <div class="row">
                        <div class="slot backline" data-side="PLAYER" data-allowed="unit"><span class="slot-text">UNIT</span></div>
                        <div class="slot backline ability-slot" data-side="PLAYER" data-allowed="ability"><span class="slot-text">ABILITY</span></div>
                        <div class="slot backline" data-side="PLAYER" data-allowed="unit"><span class="slot-text">UNIT</span></div>
                    </div>
                </div>
                <div class="core-container player-core" id="p-core-target"><div class="core-crystal"></div><div class="core-hp" id="player-core-hp">PLAYER CORE: 2000</div></div>
            </div>

            <div class="deck-container" id="enemy-deck-area">
                <div id="enemy-deck-stack" class="deck-stack"></div>
                <div id="e-deck-count" class="deck-count">Infinite</div>
            </div>
            <div class="deck-container" id="player-deck-area">
                <button id="draw-cards-btn">DRAW TO 6</button>
                <div id="player-deck-stack" class="deck-stack"></div>
                <div id="p-deck-count" class="deck-count">Infinite</div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="side-panel">
            <button id="cancel-btn" class="btn-main">CANCEL PENDING</button>
            <button id="exec-btn" class="btn-main">EXECUTE PENDING (0)</button>
            <button id="end-turn-btn" class="btn-main">END TURN</button>
            <div id="event-log"></div>
        </div>
    </div>

    <script>
        // ============================================================================
        // ⚙️ GITHUB ASSET CONFIGURATION ⚙️
        // URL encoded %20 handles spaces, %27 handles the apostrophe seamlessly.
        // ============================================================================
        const ASSET_LINKS = {
            "KIN-RYU": "./assets/Kin-Ryu.jpg",
            "Shadow Stalker": "./assets/Shadow%20Stalker.png",
            "Lionel Guard Tower": "./assets/Lionel%20Guard%20Tower.png",
            "Rolyn": "./assets/King%20Rolyn.png",
            "Althea": "./assets/Althea.png",
            "Mana Core": "./assets/Mana%20Core.png",
            "One More Time": "./assets/One%20More%20Time.png",
            "Back_Card": "./assets/Conqueror%27s%20Crown%20Back_Card.png",
            "Slash": "./assets/Slash.gif",
            "Arrow_FX": "./assets/Arrow_FX.png",
            "ShurikenKin_FX": "./assets/ShurikenKin_FX.png",
            "KinSanSound": "./assets/KinSanSound.mp3",
            "BloodSound": "./assets/BloodSound.mp3",
            "MainMenuBG": "./assets/MainMenuBG.jpg",
            "MenuMusic": "./assets/MenuMusic.mp3",
            "BodyShot": "./assets/BodyShot.mp3",
            "ArrowHit": "./assets/ArrowHit.mp3",
            "HealSound": "./assets/Heal.mp3",
            "KinSFX1": "./assets/KinSFX1.mp3",
            "KinSFX2": "./assets/KinSFX2.mp3"
        };
        // ============================================================================

        let cardLibrary = [];
        let pDrawBag = [];
        let eDrawBag = [];
        let eHandData = [];
        let currentTurn = 'PLAYER', turnCount = 1;
        let pMana = 8, eMana = 8;
        let pCoreHP = 2000, eCoreHP = 2000;
        let cardInstances = {};
        
        // Visual & Audio Assets
        let deckBackImg = '';
        let arrowImgUrl = '';
        let shurikenImgUrl = '';
        let kinSanAudioUrl = '';
        let kinSfx1Url = '';
        let kinSfx2Url = '';
        let bloodAudioUrl = '';
        let bodyShotAudioUrl = '';
        let arrowHitAudioUrl = '';
