<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conqueror's Crown - TCG</title>
    <style>
        :root {
            --bg-color: #0d0d12; --board-color: #1a1a24; --gold: #d4af37;
            --mana-color: #3498db; --hp-color: #2ecc71; --card-unit: #232931;
            --slash-url: none;
            --arrow-url: none;
            --shuriken-url: none;
            --healfx-url: none;
        }

        body {
            margin: 0; font-family: 'Cinzel', 'Georgia', serif;
            background-color: var(--bg-color); color: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- Start Screen --- */
        #start-screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(rgba(13, 13, 18, 0.6), rgba(13, 13, 18, 0.95)), url('./assets/MainMenuBG.jpg');
            background-size: cover; background-position: center; z-index: 500; 
        }
        #start-screen h1 { font-size: 4rem; color: var(--gold); letter-spacing: 8px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); text-align: center; }
        .subtitle { color: #888; margin-bottom: 40px; letter-spacing: 2px; text-align: center; }
        .upload-area { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 12px; border: 1px dashed var(--gold); margin-bottom: 20px; text-align: center; position: relative; cursor: pointer; transition: 0.3s;}
        .upload-area:hover { background: rgba(212, 175, 55, 0.2); transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        #absorbing-text { display: none; color: var(--gold); font-size: 1.5rem; margin-top: 20px; animation: pulse 1s infinite alternate; text-shadow: 0 0 10px #000;}
        @keyframes pulse { from { opacity: 0.6; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

        /* --- Game Header --- */
        #game-header { width: 100%; height: 50px; padding: 0 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; color: var(--gold); font-weight: bold; flex-shrink: 0; z-index: 50;}
        #mana-display { color: var(--mana-color); font-size: 1.2rem; }
        
        /* --- Master Layout Grid --- */
        #game-area { 
            display: none; flex-direction: row; justify-content: space-between; align-items: stretch;
            width: 100vw; height: calc(100vh - 50px); padding: 10px 15px; box-sizing: border-box; 
            overflow: hidden; gap: 15px;
            background: radial-gradient(circle at center, #1a1a24 0%, #0d0d12 100%);
            border-top: 2px solid #333;
        }

        .side-panel { width: 320px; display: flex; flex-direction: column; gap: 10px; height: 100%; flex-shrink: 0; }
        .center-panel { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; overflow: hidden; position: relative;}

        /* --- LEFT PANEL & RIGHT PANEL --- */
        #card-inspector, #event-log {
            flex-grow: 1; border-radius: 8px; padding: 15px; box-sizing: border-box; 
            display: flex; flex-direction: column; overflow-y: auto;
            background: linear-gradient(135deg, #1a1a24 0%, #111117 100%);
            border: 2px solid var(--gold);
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9), 0 10px 20px rgba(0,0,0,0.5);
        }
        
        #inspect-content { height: 100%; padding-right: 5px; }
        #inspect-content::-webkit-scrollbar, #event-log::-webkit-scrollbar { width: 5px; } 
        #inspect-content::-webkit-scrollbar-thumb, #event-log::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px;}
        
        #hand-container { height: 230px; background: rgba(0,0,0,0.85); padding: 10px; border: 2px solid #333; border-radius: 12px; display: flex; align-items: center; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); flex-shrink: 0; }
        #hand { display: flex; gap: 8px; flex-grow: 1; overflow-x: hidden; scroll-behavior: smooth; padding: 5px; }
        .scroll-btn { background: #222; color: var(--gold); border: 1px solid #444; border-radius: 5px; font-size: 1.2rem; cursor: pointer; padding: 5px; height: 100%; display: flex; align-items: center; transition: 0.2s; }
        .scroll-btn:hover { background: #444; border-color: var(--gold); }

        /* --- BUTTONS --- */
        .btn-main { width: 100%; padding: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 4px; flex-shrink: 0; font-family: 'Cinzel'; transition: 0.2s;}
        .btn-main:hover { transform: scale(1.02); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); transform: none; }
        #cancel-btn { background: #e74c3c; color: white; display: none; }
        #exec-btn { background: #2ecc71; color: #111; }
        #end-turn-btn { background: var(--gold); color: #111; }
        
        #event-log { font-family: 'Courier New', monospace; font-size: 0.75rem; }

        /* --- CENTER PANEL --- */
        #turn-banner { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); padding: 4px 30px; font-size: 0.9rem; border-radius: 20px; margin-bottom: 5px; flex-shrink: 0;}
        
        .core-container { text-align: center; margin: 5px 0; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; position: relative;}
        .core-crystal { width: 30px; height: 40px; background: linear-gradient(135deg, #e74c3c, #8e44ad); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);}
        .player-core .core-crystal { background: linear-gradient(135deg, #3498db, #2ecc71); box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);}
        .core-hp { font-weight: bold; font-size: 0.8rem; color: white; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 6px; border: 1px solid #444; letter-spacing: 1px;}

        .battlefield { display: flex; flex-direction: column; gap: 6px; align-items: center; flex-shrink: 1;}
        .board { display: flex; flex-direction: column; gap: 8px; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .row { display: flex; gap: 12px; justify-content: center;}
        
        /* Slot & Card Scale */
        .slot { width: 140px; height: 196px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #555; position: relative; box-sizing: border-box; padding: 0;}
        .card { width: 140px; height: 196px; border-radius: 6px; padding: 5px; box-sizing: border-box; cursor: grab; background: var(--card-unit); border: 1px solid #444; display: flex; flex-direction: column; justify-content: space-between; font-family: sans-serif; position: relative; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s;}
        
        .slot .card { position: absolute; top: -1px; left: -1px; width: calc(100% + 2px); height: calc(100% + 2px); margin: 0; z-index: 10; border-radius: 6px; border: 1px solid #444; box-sizing: border-box; }
        
        .card:hover { transform: translateY(-5px); border-color: var(--gold); z-index: 20;}
        .card.exhausted { filter: grayscale(1) brightness(0.5); cursor: not-allowed; }
        .card.queued-status { outline: 2px solid #f39c12; filter: brightness(0.8); }
        .card.taunted-status { outline: 2px solid #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        
        /* Glows */
        .card.target-glow { outline: 3px solid #ff4d4d; box-shadow: 0 0 20px #ff4d4d; cursor: crosshair; animation: pulse-target 1s infinite alternate;}
        .target-heal-glow { outline: 3px solid #2ecc71; box-shadow: 0 0 20px #2ecc71; cursor: crosshair; }
        .target-buff-glow { outline: 3px solid #9b59b6; box-shadow: 0 0 20px #9b59b6; cursor: crosshair; }
        .buff-double-action { outline: 3px solid #9b59b6; box-shadow: 0 0 15px #9b59b6; animation: purple-burn 0.8s infinite alternate; }

        .card-title { font-size: 0.8rem; font-weight: bold; text-align: center; color: var(--gold); line-height: 1; margin-top: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .badge-mana { position: absolute; top: -5px; left: -5px; background: var(--mana-color); color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: bold; border: 1px solid #111; z-index: 15;}
        .badge-hp { position: absolute; bottom: -5px; right: -5px; background: var(--hp-color); color: #111; border-radius: 4px; padding: 2px 6px; font-size: 0.8rem; font-weight: bold; border: 1px solid #111; z-index: 15;}
        
        /* DECKS */
        .deck-container { position: absolute; right: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 50; }
        .deck-stack { width: 100px; height: 140px; border-radius: 6px; border: 1px solid #555; background-color: #1a1a24; background-size: cover; background-position: center; transition: opacity 0.3s; }
        
        /* FX */
        @keyframes purple-burn { from { box-shadow: 0 0 10px #9b59b6; } to { box-shadow: 0 0 25px #9b59b6; } }
        .floating-text { position: absolute; font-weight: bold; font-family: 'Cinzel', serif; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 1000; animation: floatUp 1.2s forwards ease-out; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-70px) scale(1.4); opacity: 0; } }

        /* INSPECTOR */
        .inspect-h { color: var(--gold); margin: 0 0 5px 0; font-family: 'Cinzel'; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .inspect-art { width: 100%; aspect-ratio: 2.5 / 3.5; max-height: 380px; object-fit: contain; border-radius: 6px; margin-bottom: 10px; border: 2px solid rgba(212, 175, 55, 0.5); background: #000; display: block;}
        .skill-btn { width: 100%; color: white; padding: 6px; margin-top: 5px; cursor: pointer; text-align: left; transition: 0.2s; border-radius: 4px; font-family: 'Cinzel'; background: linear-gradient(to bottom, #2a2a35, #1a1a24); border: 1px solid #444; border-bottom: 3px solid #111; }
        .skill-btn:hover { border-color: var(--gold); background: linear-gradient(to bottom, #2c343f, #1e222a); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .skill-desc { font-size: 0.65rem; color: #ccc; margin-top: 3px; display: block; font-family: sans-serif;}
    </style></head><body>

    <div id="start-screen">

            <div class="battlefield">

                    <div class="row">
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                    </div>
                </div>
                <div class="board" style="border-top: 1px solid #333; padding-top: 15px;">
                    <div class="row">

            <div id="event-log"></div>

    <script>
        const ASSET_LINKS = {
            "KIN-RYU": "./assets/Kin-Ryu.png",
            "Shadow Stalker": "./assets/Shadow%20Stalker.png",
            "Lionel Guard Tower": "./assets/Lionel%20Guard%20Tower.png",
            "Rolyn": "./assets/King%20Rolyn.png",
            "Althea": "./assets/Althea.png",
            "Mana Core": "./assets/Mana%20Core.png",
            "One More Time": "./assets/One%20More%20Time.png",
            "Back_Card": "./assets/Conqueror%27s%20Crown%20Back_Card.png",
            "Slash": "./assets/Slash.gif",
            "Arrow_FX": "./assets/Arrow_FX.png",
            "ShurikenKin_FX": "./assets/ShurikenKin_FX.png",
            "HealFX": "./assets/HealFX.gif",
            "KinSanSound": "./assets/KinSanSound.mp3",
            "BloodSound": "./assets/BloodSound.mp3",
            "MainMenuBG": "./assets/MainMenuBG.jpg",
            "MenuMusic": "./assets/MenuMusic.mp3",
            "BodyShot": "./assets/BodyShot.mp3",
            "ArrowHit": "./assets/ArrowHit.mp3",
            "HealSound": "./assets/Heal.mp3",
            "KinSFX1": "./assets/KinSFX1.mp3",
            "KinSFX2": "./assets/KinSFX2.mp3"
        };

        let cardLibrary = [], eHandData = [], currentTurn = 'PLAYER', turnCount = 1;
        let pMana = 8, eMana = 8, pCoreHP = 2000, eCoreHP = 2000, cardInstances = {};
        let deckBackImg = '', arrowImgUrl = '', shurikenImgUrl = '', kinSanAudioUrl = '', kinSfx1Url = '', kinSfx2Url = '', bloodAudioUrl = '', bodyShotAudioUrl = '', arrowHitAudioUrl = '', healAudioUrl = '', menuMusicUrl = '', menuAudioEl = null;
        let pQueue = [], isTargeting = false, pendingSkill = null, isExecuting = false, targetCountReq = 1, selectedTargets = [];

        const log = document.getElementById('event-log');
        const inspect = document.getElementById('inspect-content');

        function playSound(src) { if(!src) return; let audio = new Audio(src); audio.volume = 0.6; audio.play().catch(e => {}); }

        function getCardTemplate(fileName, dataUrl) {
            let name = fileName.replace(/\.[^/.]+$/, ""); let cleanName = name.toLowerCase();
            if(cleanName.includes('kinsansound')) { kinSanAudioUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('kinsfx1')) { kinSfx1Url = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('kinsfx2')) { kinSfx2Url = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('bloodsound')) { bloodAudioUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('bodyshot')) { bodyShotAudioUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('arrowhit')) { arrowHitAudioUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('healsound')) { healAudioUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('menumusic')) { menuMusicUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('back_card')) { return { isCardBack: true, img: dataUrl }; }
            if(cleanName.includes('slash')) { return { isSlash: true, img: dataUrl }; }
            if(cleanName.includes('healfx')) { return { isHealFx: true, img: dataUrl }; }
            if(cleanName.includes('arrow_fx')) { return { isArrow: true, img: dataUrl }; }
            if(cleanName.includes('shurikenkin_fx')) { return { isShuriken: true, img: dataUrl }; }
            if(cleanName.includes('mainmenubg')) { return { isMenuBG: true, img: dataUrl }; }

            let type = 'unit';
            if (cleanName.includes('ability') || cleanName.includes('skill') || cleanName.includes('mana core') || cleanName.includes('one more time')) type = 'ability';

            if(cleanName.includes('kin-ryu')) {
                return { isPlayable: true, type: 'unit', name: "KIN-RYU", title: "YAMI NO SHINOBI (Level 7)", powerLevel: 7, summonCost: 5, hp: 1200, maxHp: 1200, atk: 400, img: dataUrl, skills: [{ name: "ICHI", manaCost: 1, desc: "Cuts target. 300-1100 DMG. If <500, rerolls." }, { name: "NI", manaCost: 2, desc: "Hits 2 targets for 300-400 damage each." }], passives: [{ name: "SHADOW STANCE", desc: "Shinobi Marks make targets take +18% DMG." }, { name: "SAN", desc: "Auto-chains shurikens upon kill." }] };
            } else if(cleanName.includes('althea')) {
                return { isPlayable: true, type: 'unit', name: "Althea", title: "Guardian Deity", powerLevel: 7, summonCost: 4, hp: 1000, maxHp: 1000, atk: 200, img: dataUrl, blessings: 0, skills: [{ name: "Blessing of the Light", manaCost: 1, desc: "Heal ally for 150-300. +1 Blessing." }, { name: "Shield of Hope", manaCost: 3, desc: "Shield frontline for 500. +1 Blessing per ally." }, { name: "Punishment of the Blessed", manaCost: 0, desc: "Beam strike front/back line. Needs 7 Blessings.", requiresBlessings: 7 }] };
            } else if(cleanName.includes('one more time')) {
                return { isPlayable: true, type: 'ability', name: "One More Time", title: "Ability Card", summonCost: 0, img: dataUrl, skills: [ { name: "Double Action", manaCost: 0, desc: "Allied unit can act twice. Next move costs 0 MP." } ] };
            } else if(cleanName.includes('mana core')) {
                return { isPlayable: true, type: 'ability', name: "Mana Core", title: "Ability Card", summonCost: 0, img: dataUrl, skills: [ { name: "Mana Initiation", manaCost: 0, desc: "Grants +3 Mana." } ] };
            } else if(cleanName.includes('lionel guard')) {
                return { isPlayable: true, type: 'unit', name: "Lionel Guard Tower", title: "Structure", powerLevel: 5, summonCost: 4, hp: 2000, maxHp: 2000, atk: 0, img: dataUrl, skills: [] };
            } else {
                return { isPlayable: true, type: type, name: name, title: "Basic Card", summonCost: 1, hp: 500, atk: 150, img: dataUrl, skills: type==='ability'?[{name:"CAST",manaCost:1,desc:"Basic spell."}]:[{name:"ATTACK",manaCost:1,desc:"Basic attack."}] };
            }
        }

        async function initializeGame() {
            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('absorbing-text').style.display = 'block';
            if(menuMusicUrl && !menuAudioEl) { menuAudioEl = new Audio(menuMusicUrl); menuAudioEl.loop = true; menuAudioEl.volume = 0.4; menuAudioEl.play().catch(e=>{}); }
            let keys = Object.keys(ASSET_LINKS);
            for(let i=0; i<keys.length; i++) {
                let key = keys[i]; let fileUrl = ASSET_LINKS[key];
                document.getElementById('absorbing-text').innerText = `Loading Asset ${i + 1} of ${keys.length}...`;
                const cardData = getCardTemplate(key, fileUrl);
                if (cardData.isCardBack) {
                    deckBackImg = cardData.img;
                    document.getElementById('player-deck-stack').style.backgroundImage = `url("${deckBackImg}")`;
                    document.getElementById('enemy-deck-stack').style.backgroundImage = `url("${deckBackImg}")`;
                } else if (cardData.isSlash) { document.documentElement.style.setProperty('--slash-url', `url("${cardData.img}")`);
                } else if (cardData.isHealFx) { document.documentElement.style.setProperty('--healfx-url', `url("${cardData.img}")`);
                } else if (cardData.isArrow) { arrowImgUrl = cardData.img;
                } else if (cardData.isShuriken) { shurikenImgUrl = cardData.img;
                } else if (cardData.isPlayable) { cardLibrary.push({...cardData}); }
                await new Promise(r => setTimeout(r, 60)); 
            }
            setTimeout(startGame, 500); 
        }

        function updateUI() {
            document.getElementById('mana-display').innerText = `MANA: ${pMana}`;
            document.getElementById('enemy-core-hp').innerText = `ENEMY CORE: ${eCoreHP} | MANA: ${eMana}`;
            document.getElementById('player-core-hp').innerText = `PLAYER CORE: ${pCoreHP}`;
            document.getElementById('exec-btn').innerText = `EXECUTE PENDING (${pQueue.length})`;
            document.getElementById('exec-btn').disabled = isExecuting || pQueue.length === 0;
            document.getElementById('cancel-btn').style.display = (pQueue.length > 0 || isTargeting) ? "block" : "none";
            document.querySelectorAll('.card').forEach(c => {
                const data = cardInstances[c.id]; if (!data) return;
                c.querySelectorAll('.placed-badge, .badge-blessing, .badge-shield').forEach(el => el.remove());
                if(data.turnPlaced === turnCount) { let b = document.createElement('div'); b.className = 'placed-badge'; b.innerText = '{PLACED}'; c.appendChild(b); }
                if(data.blessings > 0) { let bl = document.createElement('div'); bl.className = 'badge-blessing'; bl.innerText = '+' + data.blessings; c.appendChild(bl); }
                if(data.shield > 0 && data.shieldTurns >= turnCount) { let sh = document.createElement('div'); sh.className = 'badge-shield'; sh.innerText = '🛡 ' + data.shield; c.appendChild(sh); }
                if(data.queued) c.classList.add('queued-status'); else c.classList.remove('queued-status');
                if(data.exhausted) c.classList.add('exhausted'); else c.classList.remove('exhausted');
                if(data.tauntedBy) c.classList.add('taunted-status'); else c.classList.remove('taunted-status');
            });
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            addLog("BATTLE COMMENCED. No combat allowed on Turn 1.", "var(--gold)");
            updateUI(); 
            const drawBtn = document.getElementById('draw-cards-btn');
            drawBtn.style.display = "block";
            drawBtn.innerText = "DRAW HAND";
        }

        document.getElementById('draw-cards-btn').addEventListener('click', () => {
            if (isExecuting) return;
            document.getElementById('draw-cards-btn').style.display = "none";
            if (turnCount === 1) { drawAnimated(5, 'PLAYER'); setTimeout(() => drawAnimated(5, 'ENEMY'), 1500); 
            } else { let cHand = document.getElementById('hand').children.length; let toDraw = 6 - cHand; if(toDraw > 0) drawAnimated(toDraw, 'PLAYER'); }
        });

        function drawAnimated(n, sideTarget) {
            const stack = document.getElementById(sideTarget === 'PLAYER' ? 'player-deck-stack' : 'enemy-deck-stack');
            for(let i=0; i<n; i++) {
                setTimeout(() => {
                    const data = JSON.parse(JSON.stringify(cardLibrary[Math.floor(Math.random() * cardLibrary.length)]));
                    const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
                    cardInstances[cardId] = { ...data, id: cardId, exhausted: false, queued: false, side: sideTarget, turnPlaced: 0, tauntedBy: null, actionsLeft: 1, hasFreeAction: false };
                    const flyingCard = document.createElement('div'); flyingCard.className = 'flying-card';
                    flyingCard.style.backgroundImage = `url("${deckBackImg}")`;
                    const dRect = stack.getBoundingClientRect(); flyingCard.style.left = dRect.left + 'px'; flyingCard.style.top = dRect.top + 'px';
                    document.body.appendChild(flyingCard);
                    setTimeout(() => {
                        if(sideTarget === 'PLAYER') {
                            const handRect = document.getElementById('hand').getBoundingClientRect();
                            flyingCard.style.left = (handRect.left + handRect.width / 2 - 42) + 'px'; flyingCard.style.top = handRect.top + 'px'; flyingCard.style.transform = "rotateY(180deg) scale(0.9)";
                        } else { flyingCard.style.left = (window.innerWidth / 2) + 'px'; flyingCard.style.top = '-150px'; }
                        setTimeout(() => {
                            flyingCard.remove();
                            if(sideTarget === 'PLAYER') { const realCard = createCardDOM(cardId, data); realCard.classList.add('flip-reveal'); document.getElementById('hand').appendChild(realCard);
                            } else { eHandData.push(cardId); } updateUI();
                        }, 500); 
                    }, 50); 
                }, i * 250); 
            }
        }

        function createCardDOM(id, data) {
            const c = document.createElement('div'); c.className = `card`; c.id = id; c.draggable = true;
            let bgImg = `background-image: url('${data.img}');`;
            if(data.side === 'ENEMY' && data.type === 'ability' && data.turnPlaced > 0) bgImg = `background-image: url('${deckBackImg}');`;
            let html = `<div class="badge-mana">${data.summonCost}</div>`;
            if(data.side === 'PLAYER' || data.type !== 'ability') html += `<div class="card-title">${data.name}</div>`;
            html += `<div class="card-img-container" style="${bgImg}"></div>`;
            if(data.type === 'unit') html += `<div class="card-level">${"★".repeat(data.powerLevel)}</div><div class="badge-hp">${data.hp}</div>`;
            c.innerHTML = html;
            c.addEventListener('dragstart', (e) => { if(currentTurn !== 'PLAYER' || isExecuting || isTargeting) return e.preventDefault(); if(data.exhausted || data.queued) return e.preventDefault(); e.dataTransfer.setData('text', id); });
            c.addEventListener('click', () => {
                if(isExecuting) return;
                if(isTargeting) {
                    let validTarget = false; let tInst = cardInstances[id]; 
                    if(pendingSkill.skillName === "Blessing of the Light" || pendingSkill.skillName === "Double Action") { if(tInst.side === currentTurn && tInst.type === 'unit') validTarget = true;
                    } else if(pendingSkill.skillName === "Punishment of the Blessed") { if(tInst.side !== currentTurn && c.parentElement.classList.contains('frontline')) validTarget = true;
                    } else { if(tInst.side !== currentTurn) validTarget = true; }
                    if (validTarget) handleTargetSelection(id); else { addLog("Invalid target. Selection cancelled.", "#e74c3c"); document.getElementById('cancel-btn').click(); }
                } else { showInspector(id, c); }
            });
            return c;
        }

        function addLog(msg, color="white") { let p = document.createElement('div'); p.style.color = color; p.style.marginBottom = "4px"; p.innerHTML = `> ${msg}`; log.appendChild(p); log.scrollTop = log.scrollHeight; }

        document.querySelectorAll('.slot').forEach(slot => {
            slot.ondragover = (e) => e.preventDefault();
            slot.ondrop = (e) => {
                if (isExecuting || isTargeting) return;
                const cardId = e.dataTransfer.getData('text'); if (!cardId) return;
                const cardEl = document.getElementById(cardId); const data = cardInstances[cardId];
                if(slot.dataset.side === 'PLAYER' && !slot.querySelector('.card')) {
                    if(data.type !== slot.dataset.allowed) return addLog(`Needs ${slot.dataset.allowed.toUpperCase()} slot.`, "red");
                    if (data.name === "One More Time") {
                        let vAllies = Array.from(document.querySelectorAll('.slot[data-side="PLAYER"] .card')).filter(c => { let inst = cardInstances[c.id]; return inst && inst.type === 'unit' && inst.name !== "Lionel Guard Tower"; });
                        if (vAllies.length === 0) { addLog(`Cannot place: No valid attacking units fielded for One More Time.`, "red"); return; }
                    }
                    if(pMana >= data.summonCost) {
                        pMana -= data.summonCost; data.turnPlaced = turnCount; slot.appendChild(cardEl);
                        if(data.name === "One More Time") { addLog(`Played <b>One More Time</b>. Auto-activating...`, "#9b59b6"); window.queueAction(cardId, 'Double Action', 0, false);
                        } else if(data.type === 'ability') { addLog(`Set Ability Card.`, "#9b59b6");
                        } else { addLog(`Summoned <b>${data.name}</b>`, "var(--mana-color)"); }
                        updateUI(); showInspector(cardId, cardEl);
                    } else addLog(`Not enough Mana!`, "red");
                }
            };
        });

        function showInspector(id, cardElement) {
            const data = cardInstances[id]; const isDeployed = cardElement && cardElement.parentElement.classList.contains('slot');
            let availableMana = pMana - pQueue.reduce((sum, a) => sum + a.cost, 0);
            if(data.side === 'ENEMY' && data.type === 'ability') { inspect.innerHTML = `<div class="empty-inspector">Hidden Enemy Ability Card.</div>`; return; }
            let html = `<h3 class="inspect-h">${data.name}</h3><img src="${data.img}" class="inspect-art">`;
            if(data.type === 'unit') html += `<div class="inspect-stat" style="color:var(--hp-color)"><b>HP:</b> ${data.hp} | <b style="color:#e74c3c">ATK:</b> ${data.atk}</div>`;
            if(isDeployed && data.side === 'PLAYER') {
                html += `<div class="inspect-section"><b>Actions</b><br>`;
                if(data.queued) { html += `<div style="color:#f39c12;">[ACTION QUEUED]</div>`;
                } else if(data.exhausted) { html += `<div style="color:#888;">[EXHAUSTED]</div>`;
                } else {
                    const canAct = (data.turnPlaced < turnCount);
                    if(turnCount > 1 && data.type === 'unit' && data.name !== "Lionel Guard Tower" && document.querySelectorAll('.slot.frontline[data-side="ENEMY"] .card').length === 0) {
                        html += `<button class="skill-btn" style="border-color:#e74c3c" ${canAct ? '' : 'disabled'} onclick="queueAction('${id}', 'ATTACK CORE', 0, true)"><span class="skill-name" style="color:#e74c3c">[ATTACK CORE]</span></button>`;
                    }
                    if(data.name !== "Lionel Guard Tower") {
                        data.skills.forEach(skill => {
                            let actualSkillCost = data.hasFreeAction ? 0 : skill.manaCost;
                            html += `<button class="skill-btn" ${canAct && availableMana >= actualSkillCost ? '' : 'disabled'} onclick="queueAction('${id}', '${skill.name}', ${skill.manaCost}, false)"><span class="skill-name">[${skill.name}]</span><span class="skill-cost">${actualSkillCost} MP</span><span class="skill-desc">${skill.desc}</span></button>`;
                        });
                    }
                }
                html += `</div>`;
            }
            inspect.innerHTML = html;
        }

        function commitAction(action) {
            pQueue.push(action); let actorInst = cardInstances[action.actorId];
            if (actorInst && action.skillName !== "Double Action") {
                actorInst.actionsLeft--; if (actorInst.actionsLeft <= 0) actorInst.queued = true;
                else { actorInst.queued = false; addLog(`[One More Time] Queue next action for ${actorInst.name}.`, "#9b59b6"); showInspector(actorInst.id, document.getElementById(actorInst.id)); }
            }
            systemDetector("QUEUE", { action }); updateUI();
        }

        document.getElementById('cancel-btn').addEventListener('click', () => {
            if(isExecuting) return;
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('target-glow', 'target-heal-glow', 'target-buff-glow');
                let inst = cardInstances[c.id];
                if (c.classList.contains('buff-double-action')) {
                    c.classList.remove('buff-double-action');
                    if(inst) { inst.actionsLeft = inst.wasExhaustedBeforeOMT ? 0 : 1; inst.exhausted = inst.wasExhaustedBeforeOMT || false; inst.hasFreeAction = false; inst.queued = inst.actionsLeft <= 0; }
                } else if (inst) { inst.queued = false; if (inst.type !== 'ability') inst.actionsLeft = 1; }
            });
            pQueue = []; isTargeting = false; pendingSkill = null; selectedTargets = []; updateUI(); showInspector('none', null); 
        });

        async function systemDetector(trigger, payload) {
            if (trigger === "DAMAGE_CALC") {
                let dmg = payload.baseDmg;
                if (payload.actor.name === "KIN-RYU" && payload.targetInst && payload.targetInst.marks > 0) dmg = Math.floor(dmg * (1 + 0.18 * payload.targetInst.marks));
                return dmg;
            }
            if (trigger === "ATTACK_END") {
                if (payload.actor.name === "KIN-RYU" && payload.targetInst && payload.action.skillName !== "SAN" && !payload.targetDied) {
                     payload.targetInst.marks += 2; setTimeout(() => showFloatingText(document.getElementById(payload.action.targetId), "Shinobi's Mark", "#2ecc71", "1rem"), 400);
                }
            }
        }

        window.queueAction = function(actorId, skillName, cost, isCore) {
            if(currentTurn !== 'PLAYER' || isExecuting) return;
            const actor = cardInstances[actorId];
            if(actor.turnPlaced === turnCount && actor.name !== "One More Time") return addLog("Summoning Sickness!", "red");
            if(turnCount === 1) return addLog("No combat on Turn 1!", "red");
            if(actor.actionsLeft <= 0 || actor.exhausted) return addLog("Already acted!", "red");
            
            let actualCost = actor.hasFreeAction && skillName !== "Double Action" ? 0 : cost;
            if(actor.hasFreeAction && skillName !== "Double Action") actor.hasFreeAction = false;

            if(isCore) { commitAction({ actorId, actorName: actor.name, side: actor.side, skillName, cost: actualCost, targetId: 'CORE' });
            } else if (skillName === "Mana Initiation" || (actor.type === 'ability' && skillName !== "Double Action")) { commitAction({ actorId, actorName: actor.name, side: actor.side, skillName, cost: actualCost, targetId: 'SELF' });
            } else if (skillName === "Double Action") {
                isTargeting = true; pendingSkill = { actorId, actorName: actor.name, side: actor.side, skillName, cost: actualCost };
                document.querySelectorAll(`.slot[data-side="${actor.side}"] .card`).forEach(c => { if(cardInstances[c.id].type === 'unit' && cardInstances[c.id].name !== "Lionel Guard Tower") c.classList.add('target-buff-glow'); });
            } else {
                isTargeting = true; pendingSkill = { actorId, actorName: actor.name, side: actor.side, skillName, cost: actualCost };
                if (skillName === "NI") { targetCountReq = Math.min(2, document.querySelectorAll('.slot[data-side="ENEMY"] .card').length); selectedTargets = [];
                } else targetCountReq = 1;
                document.querySelectorAll('.slot[data-side="ENEMY"] .card').forEach(c => c.classList.add('target-glow'));
            }
            updateUI();
        };

        function handleTargetSelection(targetId) {
            if (pendingSkill && pendingSkill.skillName === "Double Action") {
                isTargeting = false; document.querySelectorAll('.card').forEach(c => c.classList.remove('target-glow', 'target-buff-glow'));
                let tInst = cardInstances[targetId]; let tDOM = document.getElementById(targetId);
                if (tInst) { tInst.wasExhaustedBeforeOMT = tInst.exhausted; tInst.actionsLeft = (tInst.actionsLeft || 0) + 1; tInst.exhausted = false; tInst.queued = false; tInst.hasFreeAction = true; tDOM.classList.add('buff-double-action'); }
                commitAction({ ...pendingSkill, targetId }); pendingSkill = null; return;
            }
            if (targetCountReq > 1) {
                if (selectedTargets.includes(targetId)) return; selectedTargets.push(targetId);
                if (selectedTargets.length < targetCountReq) return;
                isTargeting = false; document.querySelectorAll('.card').forEach(c => c.classList.remove('target-glow'));
                commitAction({ ...pendingSkill, targetId: selectedTargets }); pendingSkill = null; selectedTargets = [];
            } else {
                isTargeting = false; document.querySelectorAll('.card').forEach(c => c.classList.remove('target-glow'));
                commitAction({ ...pendingSkill, targetId }); pendingSkill = null;
            }
        }

        async function processQueue(side, queueArr) {
            isExecuting = true; let q = [...queueArr]; if(side === 'PLAYER') pQueue = []; updateUI();
            for(let action of q) {
                const actor = cardInstances[action.actorId]; const actorDOM = document.getElementById(action.actorId);
                if(!actor || actor.hp <= 0 && actor.type !== 'ability') continue;
                if(side === 'PLAYER') pMana -= action.cost; else eMana -= action.cost; updateUI(); 

                if (action.skillName === "Double Action") {
                    if(actorDOM) { actorDOM.style.transition = "all 0.5s ease"; actorDOM.style.transform = "scale(2.5)"; actorDOM.style.zIndex = "9999";
                        await new Promise(r => setTimeout(r, 800)); actorDOM.style.opacity = "0"; actorDOM.remove(); if (cardInstances[action.actorId]) cardInstances[action.actorId].hp = 0; }
                } else if (action.skillName === "Mana Initiation") { pMana += 3;
                } else {
                    let targets = Array.isArray(action.targetId) ? action.targetId : [action.targetId];
                    for(let tId of targets) { await applyDamage(actor, tId, actor.atk || 150, action.skillName); }
                }
                updateUI(); await new Promise(r => setTimeout(r, 400));
            }
            isExecuting = false; updateUI();
        }

        document.getElementById('exec-btn').addEventListener('click', () => { if(pQueue.length > 0 && !isExecuting) processQueue('PLAYER', pQueue); });

        document.getElementById('end-turn-btn').addEventListener('click', async () => {
            if (isExecuting) return; if(pQueue.length > 0) await processQueue('PLAYER', pQueue);
            isExecuting = true; currentTurn = 'ENEMY'; document.getElementById('turn-banner').innerText = "OPPONENT TURN"; setTimeout(aiTurn, 1000);
        });

        async function aiTurn() {
            let toDraw = 6 - eHandData.length; if(toDraw > 0) { drawAnimated(toDraw, 'ENEMY'); await new Promise(r => setTimeout(r, 1000 + toDraw * 250)); }
            let summonable = eHandData.filter(id => cardInstances[id].summonCost <= eMana);
            for(let id of summonable) {
                let data = cardInstances[id];
                if(data.name === "One More Time") {
                    let vAllies = Array.from(document.querySelectorAll('.slot[data-side="ENEMY"] .card')).filter(c => { let inst = cardInstances[c.id]; return inst && inst.type === 'unit' && inst.name !== "Lionel Guard Tower"; });
                    if(vAllies.length > 0 && eMana >= data.summonCost) {
                        eMana -= data.summonCost; eHandData.splice(eHandData.indexOf(id), 1);
                        let tDOM = vAllies[Math.floor(Math.random() * vAllies.length)]; let tInst = cardInstances[tDOM.id];
                        let slot = document.querySelector('.slot[data-side="ENEMY"][data-allowed="ability"]'); slot.appendChild(createCardDOM(id, data));
                        tInst.wasExhaustedBeforeOMT = tInst.exhausted; tInst.actionsLeft = (tInst.actionsLeft || 0) + 1; tDOM.classList.add('buff-double-action'); tInst.hasFreeAction = true;
                        eQueue.push({ actorId: id, actorName: data.name, side: 'ENEMY', skillName: "Double Action", cost: 0, targetId: tInst.id });
                        updateUI(); await new Promise(r => setTimeout(r, 600));
                    }
                    continue;
                }
                // AI Summon unit logic...
            }
            let eQueue = []; // Fixed eQueue initialization position in aiTurn logic
            // AI Action logic loop...
            if(eQueue.length > 0) await processQueue('ENEMY', eQueue);
            turnCount++; currentTurn = 'PLAYER'; isExecuting = false; updateUI();
        }
    </script>
</body>
</html>
