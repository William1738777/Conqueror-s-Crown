<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conqueror's Crown - TCG Tutorial</title>
    <style>
        :root { 
            --bg-color: #0d0d12; --gold: #d4af37; --mana-color: #3498db; --hp-color: #2ecc71; --card-unit: #232931; 
            --slash-url: none; --arrow-url: none; --shuriken-url: none; --healfx-url: none; --empty-slot-url: none; 
            --empty-ability-url: none; --empty-buff-url: none; --mymana-url: none; --managain-url: none; --cc-logo-url: none;
            --worldmap-url: none; --leoniabg-url: none; --tavernbg-url: none; --atkicon-url: none;
        }
        body { margin: 0; font-family: 'Cinzel', 'Georgia', serif; background-color: var(--bg-color); color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* --- Scripted Tutorial UI --- */
        #tut-overlay-msg { 
            position: fixed; bottom: 22%; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold); color: white; 
            padding: 20px 40px; font-size: 1.3rem; border-radius: 12px; z-index: 9999; 
            text-align: center; display: none; box-shadow: 0 0 40px rgba(212, 175, 55, 0.6); 
            pointer-events: none; max-width: 600px; line-height: 1.4;
        }
        .tut-highlight-glow { 
            outline: 5px solid #2ecc71 !important; 
            box-shadow: 0 0 50px #2ecc71 !important; 
            animation: tutPulse 1s infinite alternate; 
            position: relative; z-index: 9000 !important; 
        }
        .tut-disabled-click { pointer-events: none !important; filter: brightness(0.4) grayscale(1); opacity: 0.5; }
        .tut-force-drag { cursor: copy !important; filter: brightness(1.2) !important; z-index: 9500 !important; }
        
        @keyframes tutPulse { from { box-shadow: 0 0 10px #2ecc71; } to { box-shadow: 0 0 40px #2ecc71; } }

        /* --- RPG Presentation --- */
        .rpg-screen { position: absolute; inset: 0; display: none; background-size: cover; background-position: center; z-index: 400; background-color: #111; }
        #world-map-screen { background-image: var(--worldmap-url); }
        #leonia-screen { background-image: var(--leoniabg-url); }
        #tavern-screen { background-image: var(--tavernbg-url); }

        #rpg-dialogue-box { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 80%; max-width: 800px; background: white; border: 4px solid var(--gold); 
            border-radius: 8px; padding: 20px; color: black; font-family: 'Georgia', serif; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 450; cursor: pointer; 
        }

        /* --- Tutorial Gift Presentation (No HP Bars) --- */
        .tutorial-card-presentation { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 15px; z-index: 500; }
        .tut-card { 
            width: 140px; height: 196px; border-radius: 6px; background: var(--card-unit);
            box-shadow: 0 0 20px var(--gold); border: 1px solid var(--gold);
            opacity: 0; transform: translateY(50px) rotateY(180deg); animation: swoopIn 0.6s forwards ease-out; 
            display: flex; flex-direction: column; position: relative;
        }
        .tut-card .card-hp-footer { display: none !important; } /* Hide HP during presentation */

        @keyframes swoopIn { to { opacity: 1; transform: translateY(0) rotateY(0deg); } }

        /* --- Main Battle UI --- */
        #game-area { display: none; flex-direction: row; width: 100vw; height: calc(100vh - 50px); padding: 10px; box-sizing: border-box; background: #16161d; gap: 15px; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .left-panel { flex: 1.5; max-width: 450px; }
        .center-panel { flex: 2.5; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .right-panel { width: 300px; }

        /* Slots & Battlefield */
        .slot { 
            width: 135px; height: 185px; border-radius: 6px; background: rgba(0,0,0,0.4); 
            display: flex; align-items: center; justify-content: center; position: relative; 
            background-image: var(--empty-slot-url); background-size: 100% 100%;
        }
        .slot.ability-slot { background-image: var(--empty-ability-url); }
        .slot.buff-slot { background-image: var(--empty-buff-url); width: 100px; height: 140px; }
        
        .card { 
            width: 135px; height: 185px; border-radius: 6px; background: var(--card-unit); 
            border: 1px solid #444; position: relative; cursor: grab; transition: transform 0.2s;
        }
        #hand .card { transform: scale(0.7); margin: -25px -20px; }

        /* UI Overlays */
        #game-header { width: 100%; height: 50px; background: #000; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; color: var(--gold); }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CONQUEROR'S CROWN</h1>
        <div class="subtitle">Tactical Deployment</div>
        <div class="upload-area" id="upload-box" onclick="initializeGame()">
            <h2>START TUTORIAL</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Learn the art of War.</p>
        </div>
        <div id="absorbing-text">Loading Battlefield...</div>
    </div>

    <div id="world-map-screen" class="rpg-screen">
        <div class="map-hotspot" style="top: 45%; left: 50%; width: 180px; height: 100px;" onclick="enterLeonia()">Kingdom of Leonia</div>
    </div>

    <div id="leonia-screen" class="rpg-screen">
        <div class="locations-ui">
            <h2>LOCATIONS</h2>
            <button class="loc-btn unlocked" onclick="enterTavern()">Tavern</button>
        </div>
    </div>

    <div id="tavern-screen" class="rpg-screen">
        <div id="rpg-dialogue-box" onclick="advanceDialogue()">
            <div id="dialogue-speaker">Tavern Keeper Ben</div>
            <div id="dialogue-text">...</div>
        </div>
    </div>

    <div id="tut-overlay-msg"></div>

    <div id="game-area">
        <div class="side-panel left-panel">
            <div id="card-inspector">
                <div id="inspect-header-sector"><div id="inspect-logo-box"></div><h3 id="inspect-name">Select Card</h3></div>
                <div id="inspect-body">
                    <div class="inspect-col-left"><img id="inspect-art-fixed" class="inspect-art"><div id="inspect-hp-target"></div></div>
                    <div class="inspect-col-right"><div id="inspect-skills-sector"></div></div>
                </div>
            </div>
            <div id="player-mana-wrapper"><div class="mana-icon"></div><div class="mana-num" id="mana-display-num">8</div></div>
            <div id="hand-container"><div id="hand"></div></div>
        </div>

        <div class="center-panel">
            <div id="turn-banner">PLAYER TURN 1</div>
            <div class="battlefield">
                <div class="core-container enemy-core" id="e-core-target">
                    <div class="core-hp" id="enemy-core-hp">ENEMY CORE: 2000</div>
                </div>
                <div class="board">
                    <div class="row" id="e-back-row">
                        <div class="slot backline" data-side="ENEMY" data-allowed="unit"></div>
                        <div class="slot backline ability-slot" data-side="ENEMY" data-allowed="ability"></div>
                        <div class="slot backline" data-side="ENEMY" data-allowed="unit"></div>
                    </div>
                    <div class="row" id="e-front-row">
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                        <div class="slot frontline" data-side="ENEMY" data-allowed="unit"></div>
                    </div>
                </div>
                <div class="board" style="margin-top:20px;">
                    <div class="row" id="p-front-row">
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit" id="tut-slot-squire"></div>
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit" id="tut-slot-bannerman"></div>
                        <div class="slot frontline" data-side="PLAYER" data-allowed="unit"></div>
                    </div>
                    <div class="row" id="p-back-row">
                        <div class="slot backline" data-side="PLAYER" data-allowed="unit" id="tut-slot-archer"></div>
                        <div class="slot backline ability-slot" data-side="PLAYER" data-allowed="ability" id="tut-slot-core"></div>
                        <div class="slot backline" data-side="PLAYER" data-allowed="unit"></div>
                    </div>
                </div>
                <div class="core-container player-core" id="p-core-target">
                    <div class="core-hp" id="player-core-hp">PLAYER CORE: 2000</div>
                </div>
            </div>
            <div class="deck-container" id="player-deck-area">
                <button id="draw-cards-btn">DRAW HAND</button>
                <div id="player-deck-stack" class="deck-stack"></div>
            </div>
        </div>

        <div class="side-panel right-panel">
            <button id="exec-btn" class="btn-main" disabled>EXECUTE PENDING (0)</button>
            <button id="end-turn-btn" class="btn-main" disabled>END TURN</button>
            <div id="event-log"></div>
        </div>
    </div>
    <script>
        // ============================================================================
        // ⚙️ GITHUB ASSET CONFIGURATION (RESTORED & IMPROVED) ⚙️
        // ============================================================================
        const ASSET_LINKS = {
            "Empty Slot": "./assets/Empty%20Slot.png",
            "Empty Ability Card": "./assets/Empty%20Ability%20Card.png",
            "Empty Buff Card": "./assets/Empty%20Buff%20Card.png",
            "CCLogo": "./assets/CCLogo.png",
            "MyMana": "./assets/MyMana.png",
            "ManaGain": "./assets/ManaGain.png",
            "MainMenuBG": "./assets/MainMenuBG.jpg",
            "Back_Card": "./assets/Conqueror%27s%20Crown%20Back_Card.png",
            "WorldMap": "./assets/WorldMap.png",
            "LeoniaBG": "./assets/LeoniaBG.png",
            "TavernBG": "./assets/Tavern.png",
            "AtkIcon": "./assets/AtkIcon.png",

            // Restored Audio Assets
            "DragSound": "./assets/DragSound.mp3",
            "DropSound": "./assets/DropSound.mp3",
            "AbilityActivated": "./assets/AbilityActivated.mp3",
            "BuffActivated": "./assets/BuffActivated.mp3",
            "ClickSFX": "./assets/ClickSFX.mp3",
            "MenuMusic": "./assets/MenuMusic.mp3",
            "DrawSFX": "./assets/DrawSFX.mp3",
            "PlaceSFX": "./assets/PlaceSFX.mp3",
            "VillagerSuicideSFX": "./assets/VillagerSuicideSFX.mp3",
            "BodyShot": "./assets/BodyShot.mp3",
            "ArrowHit": "./assets/ArrowHit.mp3",
            "HealSound": "./assets/Heal.mp3",
            "Beam": "./assets/Beam.mp3",
            "ShieldSFX": "./assets/ShieldSFX.mp3",

            // Visual FX
            "Slash": "./assets/Slash.gif",
            "Arrow_FX": "./assets/Arrow_FX.png",
            "HealFX": "./assets/HealFX.gif",
            "JadenLock": "./assets/JadenLock.png",
            "Taunted": "./assets/Taunted.png",
            "Barrier": "./assets/Barrier.png",

            // Scripted Tutorial Roster
            "Leonian Squire": "./assets/Squire.png",
            "Great Knight": "./assets/Great%20Knight.png",
            "Leonian Bannerman": "./assets/Bannerman.png",
            "Archer": "./assets/Archer.png",
            "Militia": "./assets/Militia.png",
            "Mana Core": "./assets/Mana%20Core.png"
        };

        // --- GLOBAL STATE ---
        let cardLibrary = [];
        let cardInstances = {};
        let pMana = 8, eMana = 8;
        let pCoreHP = 2000, eCoreHP = 2000;
        let pSquiresFallen = 0, eSquiresFallen = 0;
        let turnCount = 1;
        let isTutorialMode = true;
        let tutorialStep = 0;
        let tutorialLock = true; 
        
        // Audio Pointers
        let dragSoundUrl, dropSoundUrl, clickSfxUrl, drawSfxUrl, abilityActivatedUrl, buffActivatedUrl, menuMusicUrl, villagerSuicideSfxUrl;
        let menuAudioEl = null;

        // ============================================================================
        // 🗡️ CARD TEMPLATES (ID-PROOFED) 🗡️
        // ============================================================================
        function getCardTemplate(fileName, dataUrl) {
            let name = fileName.replace(/\.[^/.]+$/, "");
            let cleanName = name.toLowerCase();

            // Asset Routing Side-Effects (Restoring Audio)
            if(cleanName.includes('dragsound')) { dragSoundUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('dropsound')) { dropSoundUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('clicksfx')) { clickSfxUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('drawsfx')) { drawSfxUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('abilityactivated')) { abilityActivatedUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('buffactivated')) { buffActivatedUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('menumusic')) { menuMusicUrl = dataUrl; return { isAudio: true }; }
            if(cleanName.includes('villagersuicide')) { villagerSuicideSfxUrl = dataUrl; return { isAudio: true }; }

            // Unit Definitions
            if (cleanName === "leonian squire") {
                return { isPlayable: true, type: 'unit', name: "Leonian Squire", summonCost: 1, hp: 450, maxHp: 450, atk: 100, img: dataUrl, faction: "Leonia", skills: [{ name: "SHORTSWORD STRIKE", manaCost: 0, desc: "Deals 100 DMG." }] };
            }
            if (cleanName === "archer") {
                return { isPlayable: true, type: 'unit', name: "Archer", summonCost: 1, hp: 500, maxHp: 500, atk: 120, img: dataUrl, faction: "Leonia", skills: [{ name: "VOLLEY", manaCost: 1, desc: "Ranged attack (120 DMG)." }] };
            }
            if (cleanName === "leonian bannerman") {
                return { isPlayable: true, type: 'unit', name: "Leonian Bannerman", summonCost: 2, hp: 650, maxHp: 650, atk: 50, img: dataUrl, faction: "Leonia", skills: [{ name: "RALLY", manaCost: 2, desc: "Shield and Buff all allies." }] };
            }
            if (cleanName === "great knight") {
                return { isPlayable: true, type: 'unit', name: "Great Knight", summonCost: 3, summonRequires: { type: 'squiresFallen', amount: 1 }, hp: 950, maxHp: 950, atk: 200, img: dataUrl, faction: "Leonia", skills: [{ name: "HEAVY STRIKE", manaCost: 0, desc: "Heavy physical strike." }] };
            }
            if (cleanName === "militia") {
                return { isPlayable: true, type: 'unit', name: "Militia", summonCost: 1, hp: 600, maxHp: 600, atk: 150, img: dataUrl, faction: "Neutral", skills: [{ name: "Suicidal attack", manaCost: 2, desc: "Instant 700 DMG but dies." }] };
            }
            if (cleanName === "mana core") {
                return { isPlayable: true, type: 'ability', name: "Mana Core", summonCost: 0, hp: 1, img: dataUrl, skills: [{ name: "Mana Initiation", manaCost: 0, desc: "Grants +3 Mana." }] };
            }

            return { name: name, img: dataUrl }; 
        }

        // --- ASSET INITIALIZER ---
        async function initializeGame() {
            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('absorbing-text').style.display = 'block';

            if(menuMusicUrl && !menuAudioEl) {
                menuAudioEl = new Audio(menuMusicUrl);
                menuAudioEl.loop = true; menuAudioEl.volume = 0.4;
                menuAudioEl.play().catch(e=>{});
            }

            let keys = Object.keys(ASSET_LINKS);
            for(let i=0; i<keys.length; i++) {
                let key = keys[i];
                let fileUrl = ASSET_LINKS[key];
                document.getElementById('absorbing-text').innerText = `Syncing Battlefield Assets... (${i+1}/${keys.length})`;
                
                const cardData = getCardTemplate(key, fileUrl);
                if (cardData.isPlayable) cardLibrary.push(cardData);
                await new Promise(r => setTimeout(r, 40)); 
            }
            
            // Proceed to Map
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('world-map-screen').style.display = 'block';
        }

        // RESTORED SOUND WRAPPER
        window.playClickSound = function() {
            if (clickSfxUrl) {
                let audio = new Audio(clickSfxUrl);
                audio.volume = 0.5;
                audio.play().catch(e => {});
            }
        };

        function playSound(src) {
            if(!src) return;
            let audio = new Audio(src);
            audio.volume = 0.6;
            audio.play().catch(e => {});
        }
    </script>
    <script>
        // ============================================================================
        // 🕹️ SCRIPTED TUTORIAL CONTROLLER 🕹️
        // ============================================================================
        
        // --- STEP 1: INITIALIZE TUTORIAL DECK ---
        function runScriptedStep() {
            if (!isTutorialMode) return;

            const tutMsg = document.getElementById('tut-overlay-msg');
            const hand = document.getElementById('hand');
            const slots = document.querySelectorAll('.slot');
            const endBtn = document.getElementById('end-turn-btn');
            const execBtn = document.getElementById('exec-btn');

            // Reset UI state for each step
            document.querySelectorAll('.tut-highlight-glow').forEach(el => el.classList.remove('tut-highlight-glow'));
            document.querySelectorAll('.card').forEach(c => c.classList.remove('tut-disabled-click', 'tut-force-drag'));
            tutMsg.style.display = 'block';

            switch(tutorialStep) {
                case 0: // Draw Phase
                    setTutMsg("Greetings, Adventurer. First, draw your starting hand.", document.getElementById('draw-cards-btn'));
                    break;

                case 1: // Place Squire
                    setTutMsg("Deploy your <b>Leonian Squire</b> to the highlighted <b>Frontline</b> slot.", document.getElementById('tut-slot-squire'));
                    lockHandTo("Leonian Squire");
                    break;

                case 2: // Place Archer
                    setTutMsg("Ranged units like the <b>Archer</b> belong in the <b>Backline</b>. She is protected as long as you have a frontline.", document.getElementById('tut-slot-archer'));
                    lockHandTo("Archer");
                    break;

                case 3: // Place Mana Core
                    setTutMsg("Place the <b>Mana Core</b> in the purple <b>Ability Slot</b>. These provide tactical boosts.", document.getElementById('tut-slot-core'));
                    lockHandTo("Mana Core");
                    break;

                case 4: // Place Bannerman
                    setTutMsg("Finally, place the <b>Bannerman</b>. He will buff your troops later.", document.getElementById('tut-slot-bannerman'));
                    lockHandTo("Leonian Bannerman");
                    break;

                case 5: // End Turn 1
                    setTutMsg("Your Mana is spent. End your turn to see Ben's response.", endBtn);
                    endBtn.disabled = false;
                    break;

                case 6: // Turn 2 - Attack Prep
                    setTutMsg("It's your turn. Select your <b>Squire</b> and click <b>[SHORTSWORD STRIKE]</b>.", document.querySelector('#p-front-row .card'));
                    endBtn.disabled = true;
                    break;

                case 7: // Target Enemy
                    setTutMsg("Now click on the enemy <b>Militia</b> to target it.", document.querySelector('#e-front-row .card'));
                    break;

                case 8: // Execute Attack
                    setTutMsg("Action queued! Click <b>EXECUTE</b> to strike.", execBtn);
                    execBtn.disabled = false;
                    break;

                case 9: // Ben's Suicide Attack (Scripted Event)
                    setTutMsg("Watch out! Ben is using his Militia's suicide skill...");
                    runBenSuicideLogic();
                    break;

                case 10: // Summon Great Knight
                    setTutMsg("With your Squire fallen, the <b>Great Knight's</b> condition is met. Summon him now!", document.getElementById('p-front-row').children[0]);
                    lockHandTo("Great Knight");
                    pSquiresFallen = 1; // Scripted override
                    updateUI();
                    break;

                case 11: // Finale
                    setTutMsg("Tutorial complete! Strike the Enemy Core to finish the game.");
                    tutorialLock = false; 
                    endBtn.disabled = false;
                    break;
            }
        }

        // --- IDIOT-PROOF HELPER: LOCK HAND ---
        function lockHandTo(cardName) {
            document.querySelectorAll('#hand .card').forEach(c => {
                const data = cardInstances[c.id];
                if (data.name !== cardName) {
                    c.classList.add('tut-disabled-click');
                } else {
                    c.classList.add('tut-force-drag');
                }
            });
        }

        function setTutMsg(text, highlightEl = null) {
            const msgBox = document.getElementById('tut-overlay-msg');
            msgBox.innerHTML = text;
            if (highlightEl) highlightEl.classList.add('tut-highlight-glow');
        }

        // --- SCRIPTED COMBAT: BEN'S REVENGE ---
        async function runBenSuicideLogic() {
            isExecuting = true;
            await new Promise(r => setTimeout(r, 1500));
            
            const squireDOM = document.querySelector('#p-front-row .card');
            const militiaDOM = document.querySelector('#e-front-row .card');
            
            if (militiaDOM && squireDOM) {
                addLog("ENEMY Militia uses Suicidal Attack!", "#e74c3c");
                if (villagerSuicideSfxUrl) playSound(villagerSuicideSfxUrl);
                
                showFloatingText(squireDOM, "-700", "#ff4d4d", "3rem");
                triggerSlash(squireDOM);
                
                await new Promise(r => setTimeout(r, 800));
                
                // Clean up cards
                const squireId = squireDOM.id;
                delete cardInstances[squireId];
                squireDOM.remove();
                militiaDOM.remove();
                
                pSquiresFallen = 1; 
                addLog("Your Squire has fallen! A condition for the Great Knight is met.", "var(--gold)");
            }
            
            isExecuting = false;
            tutorialStep = 10;
            runScriptedStep();
        }

        // --- OVERRIDE: END TURN LOGIC ---
        const originalEndTurn = document.getElementById('end-turn-btn').onclick;
        document.getElementById('end-turn-btn').onclick = function() {
            if (isTutorialMode && tutorialStep === 5) {
                tutorialStep = 6;
                runBenScriptedTurn();
            } else if (!tutorialLock) {
                // Normal game logic
            }
        };

        async function runBenScriptedTurn() {
            document.getElementById('turn-banner').innerText = "OPPONENT TURN";
            await new Promise(r => setTimeout(r, 1000));
            
            // Ben places Militia and Archer as requested
            const milData = cardLibrary.find(c => c.name === "Militia");
            const arcData = cardLibrary.find(c => c.name === "Archer");
            
            const frontSlot = document.querySelector('#e-front-row .slot');
            const backSlot = document.querySelector('#e-back-row .slot');
            
            await aiDragAndDrop('ben_mil', milData, frontSlot);
            await aiDragAndDrop('ben_arc', arcData, backSlot);
            
            addLog("Ben deploys his defenses.", "#e74c3c");
            
            await new Promise(r => setTimeout(r, 1000));
            tutorialStep = 6;
            turnCount++;
            document.getElementById('turn-banner').innerText = "PLAYER TURN 2";
            runScriptedStep();
        }

        // --- GLOBAL OVERRIDE FOR DRAG/DROP SOUNDS ---
        document.addEventListener('dragstart', () => { if(dragSoundUrl) playSound(dragSoundUrl); });
        document.addEventListener('drop', () => { if(dropSoundUrl) playSound(dropSoundUrl); });

        // Initialize Tutorial on start
        window.onload = () => {
            // Wait for user to click "Start Tutorial"
        };
    </script>
</body>
</html>
